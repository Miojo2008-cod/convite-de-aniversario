<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Convite - Agatha 18 anos</title>
<style>
  :root{
    --coral:#e8577a;
    --coral-deep:#c9436a;
    --peach:#f6a98b;
    --cream:#f6ece6;
    --gold:#f5c26b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'Georgia', serif;
    background:#1a1116;
    overflow:hidden;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    height:100dvh;
    overflow:hidden;
    background:var(--cream);
    box-shadow:0 0 60px rgba(0,0,0,0.6);
    transition:width .3s ease, height .3s ease;
  }
  /* on tablets/desktops the invite becomes a centered "phone card"
     instead of stretching full width, so it stays readable at any resolution */
  @media (min-width:640px){
    body{
      background:radial-gradient(circle at 50% 15%, #f6c9b6 0%, #e8577a 55%, #7a2540 100%);
    }
    .stage{
      width:min(92vw, 440px);
      height:min(92vh, 880px);
      border-radius:32px;
      box-shadow:0 30px 80px rgba(0,0,0,0.55);
    }
    .frame{ border-radius:20px !important; }
  }

  /* generic "frame" that reproduces the artwork's 750x1333 canvas
     pixel-perfect, regardless of screen size, so overlays line up */
  .frame-holder{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--cream);
  }
  .frame{
    position:relative;
    width:94%;
    max-width:420px;
    aspect-ratio:750/1333;
    margin:0 auto;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 14px 34px rgba(120,50,60,0.18);
  }
  .frame img.bg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  #sec-hero .frame, #sec-details .frame{
    animation:frameFloat 5.5s ease-in-out infinite;
  }
  @keyframes frameFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-9px); }
  }

  /* gently floating decorative elements, purely visual */
  .floaty{
    position:absolute;
    pointer-events:none;
    font-size:22px;
    opacity:.5;
    animation:floaty 6s ease-in-out infinite;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.15));
    z-index:1;
  }
  @keyframes floaty{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-18px) rotate(8deg); }
  }

  /* =========================================================
     ENVELOPE SCENE
  ==========================================================*/
  #envelope-scene{
    position:absolute; inset:0;
    z-index:50;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:var(--cream);
    transition:opacity .7s ease, visibility .7s ease;
    gap:14px;
    padding:20px 0;
  }
  #envelope-scene.done{ opacity:0; visibility:hidden; pointer-events:none; }
  #envelope-scene .frame{ box-shadow:none; border-radius:0; cursor:pointer; }
  #envelope-scene .frame img.bg{ pointer-events:none; }

  .env-hotspot{
    position:absolute;
    left:12.67%; top:35.86%;
    width:74.67%; height:28.28%;
    perspective:1400px;
    z-index:5;
  }

  .env-hint{
    color:var(--coral-deep);
    letter-spacing:3px;
    font-size:11.5px;
    text-transform:uppercase;
    font-family:'Helvetica Neue', Arial, sans-serif;
    opacity:.85;
    animation:pulse 1.8s ease-in-out infinite;
  }

  .env-music{
    display:inline-flex;
    align-items:center;
    gap:7px;
    color:var(--coral-deep);
    font-family:'Helvetica Neue', Arial, sans-serif;
    font-size:11px;
    letter-spacing:.5px;
    text-decoration:none;
    border:1px solid var(--coral-deep);
    padding:8px 16px;
    border-radius:20px;
    opacity:.85;
  }

  .confetti{ position:absolute; inset:0; pointer-events:none; z-index:60; opacity:0; }
  .confetti.show{ opacity:1; }
  .dot{ position:absolute; width:8px; height:8px; border-radius:50%; top:-10px; animation:fall 1.6s ease-in forwards; }
  @keyframes fall{ to{ transform:translateY(115vh) rotate(360deg); opacity:0; } }

  /* =========================================================
     SITE
  ==========================================================*/
  #site{
    position:absolute; inset:0;
    overflow-y:auto; overflow-x:hidden;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
  }
  #site::-webkit-scrollbar{ display:none; }
  section{
    position:relative; width:100%;
    height:100vh; height:100dvh;
    scroll-snap-align:start;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .reveal{ opacity:0; transform:translateY(28px); transition:opacity .8s ease, transform .8s cubic-bezier(.2,.8,.2,1); }
  section.in-view .reveal{ opacity:1; transform:translateY(0); }
  .reveal:nth-child(1){transition-delay:.05s;}
  .reveal:nth-child(2){transition-delay:.18s;}
  .reveal:nth-child(3){transition-delay:.3s;}
  .reveal:nth-child(4){transition-delay:.42s;}

  #dotnav{
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    z-index:40; display:flex; flex-direction:column; gap:10px;
  }
  #dotnav button{
    width:8px; height:8px; border-radius:50%;
    border:1.5px solid var(--coral-deep); background:transparent;
    padding:0; cursor:pointer; opacity:.55; transition:all .3s ease;
  }
  #dotnav button.active{ background:var(--coral-deep); width:10px; height:10px; opacity:1; }
  #sec-hero #dotnav, #sec-hero + section #dotnav{ }
  section#sec-countdown #dotnav button,
  #dotnav.on-dark button{ border-color:#fff; }
  #dotnav.on-dark button.active{ background:#fff; }

  /* ---------- HERO ---------- */
  #sec-hero{ background:linear-gradient(180deg, var(--cream), #f3d9cd); }
  .hero-icons{ position:absolute; inset:0; }
  .icon-btn{
    position:absolute;
    width:12.4%; height:6.9%;
    border-radius:50%;
    border:none;
    background:transparent;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .icon-btn svg{ width:44%; height:44%; color:#fff; filter:drop-shadow(0 1px 2px rgba(0,0,0,.25)); transition:transform .25s ease; }
  .icon-btn:active svg{ transform:scale(.82); }
  @media (hover:hover){ .icon-btn:hover svg{ transform:scale(1.15); } }
  .icon-loc{ left:26.0%; top:68.6%; transform:translate(-50%,-50%); }
  .icon-rsvp{ left:46.9%; top:68.6%; transform:translate(-50%,-50%); }
  .icon-wpp{ left:67.3%; top:68.6%; transform:translate(-50%,-50%); }

  .scroll-cue{
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    color:var(--coral-deep);
    font-family:'Helvetica Neue', Arial, sans-serif;
    font-size:10.5px; letter-spacing:2px; text-transform:uppercase;
    display:flex; flex-direction:column; align-items:center; gap:5px;
    animation:bob 1.8s ease-in-out infinite; z-index:2;
  }
  @keyframes bob{ 0%,100%{transform:translate(-50%,0);} 50%{transform:translate(-50%,8px);} }
  .scroll-cue svg{ width:15px; height:15px; }

  /* ---------- COUNTDOWN ---------- */
  #sec-countdown{
    background:radial-gradient(circle at 50% 0%, #f6a98b 0%, #e8577a 55%, #c9436a 100%);
    flex-direction:column; text-align:center; padding:0 26px;
  }
  .cd-eyebrow{ color:#ffe6da; font-family:'Helvetica Neue', Arial, sans-serif; letter-spacing:4px; text-transform:uppercase; font-size:11px; margin-bottom:10px; }
  .cd-title{ color:#fff; font-size:26px; margin:0 0 30px; font-family:'Brush Script MT','Segoe Script',cursive; font-style:italic; }
  .cd-grid{ display:flex; gap:12px; justify-content:center; margin-bottom:26px; }
  .cd-box{ background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.4); border-radius:14px; width:64px; padding:12px 0 10px; backdrop-filter:blur(4px); animation:cdPulse 3.2s ease-in-out infinite; }
  .cd-box:nth-child(2){ animation-delay:.15s; }
  .cd-box:nth-child(3){ animation-delay:.3s; }
  .cd-box:nth-child(4){ animation-delay:.45s; }
  @keyframes cdPulse{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
  .cd-num{ color:#fff; font-size:26px; font-weight:700; font-family:'Helvetica Neue', Arial, sans-serif; line-height:1; }
  .cd-label{ color:#ffe6da; font-size:9px; letter-spacing:1px; text-transform:uppercase; margin-top:6px; font-family:'Helvetica Neue', Arial, sans-serif; }
  .cd-sub{ color:#fff; font-family:'Helvetica Neue', Arial, sans-serif; font-size:13px; line-height:1.7; opacity:.95; }
  .cd-sub b{ display:block; font-size:16px; letter-spacing:1px; }

  /* ---------- DETAILS ---------- */
  #sec-details{ background:linear-gradient(180deg, #f3d9cd, var(--cream)); }

  /* ---------- RSVP ---------- */
  #sec-rsvp{
    background:linear-gradient(180deg, var(--cream) 0%, #ffe3d6 60%, #f6a98b 100%);
    flex-direction:column; padding:34px 28px; text-align:center;
  }
  .rsvp-eyebrow{ color:var(--coral-deep); font-family:'Helvetica Neue', Arial, sans-serif; letter-spacing:4px; text-transform:uppercase; font-size:11px; margin-bottom:8px; }
  .rsvp-title{ font-size:28px; color:var(--coral-deep); font-family:'Brush Script MT','Segoe Script',cursive; font-style:italic; margin:0 0 18px; }
  #rsvpName{ width:100%; max-width:280px; padding:13px 18px; border-radius:30px; border:1.5px solid var(--peach); background:#fff; font-family:'Helvetica Neue', Arial, sans-serif; font-size:14px; color:#7a3346; outline:none; margin-bottom:16px; }
  #rsvpName::placeholder{ color:#c99; }
  .rsvp-toggle{ display:flex; background:#fff; border-radius:30px; padding:4px; gap:4px; box-shadow:0 6px 18px rgba(201,67,106,0.18); margin-bottom:20px; }
  .rsvp-toggle button{ border:none; background:transparent; padding:12px 20px; border-radius:26px; font-family:'Helvetica Neue', Arial, sans-serif; font-size:12.5px; font-weight:700; letter-spacing:.5px; color:var(--coral-deep); cursor:pointer; transition:all .25s ease; }
  .rsvp-toggle button.selected{ background:var(--coral-deep); color:#fff; }
  .btn-primary{ display:inline-block; background:var(--coral-deep); color:#fff; border:none; font-family:'Helvetica Neue', Arial, sans-serif; letter-spacing:1.5px; text-transform:uppercase; font-size:12px; font-weight:700; padding:15px 34px; border-radius:30px; cursor:pointer; box-shadow:0 10px 22px rgba(201,67,106,0.35); text-decoration:none; margin-bottom:14px; }
  .btn-outline{ display:inline-flex; align-items:center; gap:8px; background:transparent; color:var(--coral-deep); border:1.5px solid var(--coral-deep); font-family:'Helvetica Neue', Arial, sans-serif; letter-spacing:1.5px; text-transform:uppercase; font-size:11.5px; font-weight:700; padding:12px 26px; border-radius:30px; cursor:pointer; text-decoration:none; }
  .rsvp-footer{ margin-top:20px; color:#a6516a; font-size:12.5px; font-family:'Helvetica Neue', Arial, sans-serif; line-height:1.6; }
  .rsvp-footer .sig{ display:block; margin-top:6px; font-family:'Brush Script MT','Segoe Script',cursive; font-style:italic; font-size:19px; color:var(--coral-deep); }
  .divider{ width:34px; height:2px; background:var(--peach); margin:0 auto 20px; border-radius:2px; }

  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

  /* ---------- BACK BUTTONS ---------- */
  .back-btn{
    position:absolute;
    top:18px; left:18px;
    z-index:25;
    width:38px; height:38px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.88);
    color:var(--coral-deep);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,0.2);
    display:flex; align-items:center; justify-content:center;
    transition:transform .18s ease;
  }
  .back-btn:active{ transform:scale(.88); }

  /* ---------- MUSIC TOGGLE ---------- */
  .music-btn{
    position:absolute;
    bottom:18px; right:16px;
    z-index:90;
    width:46px; height:46px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.92);
    color:var(--coral-deep);
    font-size:19px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,0.28);
    display:flex; align-items:center; justify-content:center;
    animation:musicSpin 6s linear infinite;
  }
  .music-btn.paused{ animation-play-state:paused; opacity:.55; }
  @keyframes musicSpin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
</style>
</head>

  <!--
    ======================================================================
    🎵 MÚSICA DE FUNDO (via YouTube, sem precisar baixar nada):
    1) Ache o vídeo/música no YouTube e copie o link, ex:
       https://www.youtube.com/watch?v=dQw4w9WgXcQ
    2) Pegue só o código depois de "v=" (no exemplo acima: dQw4w9WgXcQ).
    3) Cole esse código no lugar de "SEU_VIDEO_ID_AQUI" logo abaixo,
       nas DUAS linhas onde ele aparece (videoId e playlist).
    Obs: alguns vídeos têm a incorporação bloqueada pelo dono do canal;
    se a música não tocar, tente outro vídeo/link.
    ======================================================================
  -->
  <div id="yt-player" style="position:absolute; width:1px; height:1px; overflow:hidden; opacity:0; pointer-events:none;"></div>
  <button id="musicToggle" class="music-btn" aria-label="Ligar ou pausar a música">🎵</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  /* ---------- ENVELOPE OPEN ---------- */
  const envFrame = document.getElementById('envFrame');
  const envHotspot = document.getElementById('envHotspot');
  const envelopeScene = document.getElementById('envelope-scene');
  const confetti = document.getElementById('confetti');
  const site = document.getElementById('site');
  let opened = false;

  function burstConfetti(){
    confetti.innerHTML = '';
    const colors = ['#e8577a','#f5c26b','#f6a98b','#e08fd6','#fff'];
    for(let i=0;i<28;i++){
      const d = document.createElement('div');
      d.className = 'dot';
      d.style.left = Math.random()*100+'%';
      d.style.background = colors[Math.floor(Math.random()*colors.length)];
      d.style.animationDelay = (Math.random()*0.4)+'s';
      d.style.animationDuration = (1.2+Math.random()*0.8)+'s';
      confetti.appendChild(d);
    }
    confetti.classList.add('show');
    setTimeout(()=>confetti.classList.remove('show'), 2200);
  }

  function openEnvelope(){
    if(opened) return;
    opened = true;
    envHotspot.classList.add('opening');
    envFrame.classList.add('opening');
    burstConfetti();
    startMusic();
    setTimeout(()=>{
      envelopeScene.classList.add('done');
      site.scrollTo({top:0});
    }, 1300);
  }

  /* ---------- BACK BUTTONS ---------- */
  document.querySelectorAll('.back-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const prev = document.getElementById(btn.dataset.prev);
      if(prev) prev.scrollIntoView({behavior:'smooth'});
    });
  });

  /* ---------- BACKGROUND MUSIC (YouTube, escondido) ---------- */
  const YT_VIDEO_ID = 'tmlGA_zFtpQ'; // <-- cole aqui o ID do vídeo do YouTube
  const musicToggle = document.getElementById('musicToggle');
  let ytPlayer = null;
  let ytReady = false;
  let musicStarted = false;

  window.onYouTubeIframeAPIReady = function(){
    ytPlayer = new YT.Player('yt-player', {
      height:'1', width:'1',
      videoId: YT_VIDEO_ID,
      playerVars:{
        autoplay:0, controls:0, disablekb:1, fs:0,
        loop:1, playlist: YT_VIDEO_ID
      },
      events:{
        onReady: ()=>{ ytReady = true; ytPlayer.setVolume(55); if(musicStarted) ytPlayer.playVideo(); }
      }
    });
  };

  function startMusic(){
    if(musicStarted) return;
    musicStarted = true;
    if(ytReady) ytPlayer.playVideo();
  }
  musicToggle.addEventListener('click', ()=>{
    if(!ytReady) return;
    const state = ytPlayer.getPlayerState();
    if(state === 1){ ytPlayer.pauseVideo(); musicToggle.classList.add('paused'); }
    else { ytPlayer.playVideo(); musicToggle.classList.remove('paused'); }
  });
  envFrame.addEventListener('click', openEnvelope);
  envFrame.addEventListener('keypress', e=>{ if(e.key==='Enter'||e.key===' ') openEnvelope(); });

  /* ---------- SCROLL REVEAL ---------- */
  const sections = document.querySelectorAll('section');
  const dots = document.querySelectorAll('#dotnav button');
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('in-view');
        dots.forEach(d=>d.classList.toggle('active', d.dataset.target===entry.target.id));
        document.getElementById('dotnav').classList.toggle('on-dark', entry.target.id==='sec-countdown');
      }
    });
  }, {root:site, threshold:0.55});
  sections.forEach(s=>io.observe(s));

  dots.forEach(d=>{
    d.addEventListener('click', ()=>{
      document.getElementById(d.dataset.target).scrollIntoView({behavior:'smooth'});
    });
  });

  document.getElementById('heroRsvpBtn').addEventListener('click', ()=>{
    document.getElementById('sec-rsvp').scrollIntoView({behavior:'smooth'});
  });

  /* ---------- COUNTDOWN ---------- */
  const target = new Date('2026-08-22T14:00:00');
  function tick(){
    const now = new Date();
    let diff = target - now;
    if(diff < 0) diff = 0;
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    document.getElementById('cd-days').textContent = String(d).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-min').textContent = String(m).padStart(2,'0');
    document.getElementById('cd-sec').textContent = String(s).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);

  /* ---------- RSVP ---------- */
  const toggleBtns = document.querySelectorAll('.rsvp-toggle button');
  const rsvpSend = document.getElementById('rsvpSend');
  const rsvpName = document.getElementById('rsvpName');
  let choice = 'sim';
  const WHATSAPP_NUMBER = '5516996094863'; // <-- troque pelo número real (DDI+DDD+numero)

  function updateLink(){
    const name = rsvpName.value.trim() || 'convidado(a)';
    const msg = choice === 'sim'
      ? `Oi Agatha! Aqui é ${name}. Confirmo presença na sua festa de 18 anos dia 22/08 às 14h! 🎉🌺`
      : `Oi Agatha! Aqui é ${name}. Infelizmente não vou conseguir ir na sua festa dia 22/08, mas te desejo um dia incrível! 💕`;
    rsvpSend.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  }
  toggleBtns.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      toggleBtns.forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      choice = btn.dataset.choice;
      updateLink();
    });
  });
  rsvpName.addEventListener('input', updateLink);
  document.querySelector('.rsvp-toggle button[data-choice="sim"]').classList.add('selected');
  updateLink();
</script>
</body>
</html>
